[tools]
rust = "stable"

[env]
RUST_BACKTRACE = "1"

[tasks.fmt]
run = "cargo fmt --all"

[tasks.fmt-check]
run = "cargo fmt --all -- --check"

[tasks.lint]
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks.test]
run = "cargo test --workspace --all-features"

[tasks.ci]
depends = ["fmt-check", "lint", "test"]
