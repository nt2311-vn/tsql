services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tsql
      POSTGRES_PASSWORD: tsql
      POSTGRES_DB: tsql
    ports:
      - "54329:5432"
    volumes:
      - ./seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsql -d tsql"]
      interval: 5s
      timeout: 5s
      retries: 10
