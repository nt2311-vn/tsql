name: release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: crates-io-release
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-features

      - name: Package workspace
        run: cargo package --workspace --allow-dirty

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p tsql-core --token "$CARGO_REGISTRY_TOKEN"
          cargo publish -p tsql-db --token "$CARGO_REGISTRY_TOKEN"
          cargo publish -p tsql-sql --token "$CARGO_REGISTRY_TOKEN"
          cargo publish -p tsql-tui --token "$CARGO_REGISTRY_TOKEN"
          cargo publish -p tsql --token "$CARGO_REGISTRY_TOKEN"
