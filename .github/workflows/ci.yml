name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Format + clippy run on a single OS — they don't exercise platform
  # behaviour, just lint the source. Linux is fastest on GitHub-hosted
  # runners.
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # Build + unit/integration tests run across every OS we ship binaries
  # for. macOS catches platform-specific regressions (path separators,
  # signal handling, terminal capabilities, default config locations)
  # before they hit users. Windows isn't in the matrix yet — the
  # crossterm Windows backend works, but `dirs` config-dir semantics
  # differ enough that we'd want a dedicated pass first.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # The macos-latest runners are arm64; partition the cache so
          # they don't fight the x86_64 Linux artifacts.
          key: ${{ matrix.os }}

      - name: Show toolchain
        run: rustc --version --verbose

      - name: Build (workspace)
        run: cargo build --workspace --all-features

      - name: Run tests
        run: cargo test --workspace --all-features

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit dependencies
        # Keep this list in sync with `just audit` — reasons documented
        # there. Briefly:
        #   RUSTSEC-2023-0071: RSA Marvin (transitive via sqlx-mysql).
        #   RUSTSEC-2024-0436 / RUSTSEC-2025-0134: maintenance advisories
        #     for `paste` / `rustls-pemfile`.
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2025-0134

  # Postgres integration test stays Linux-only because GitHub-hosted
  # runners only expose `services:` containers on Linux. macOS builds
  # already covered the metadata fetchers via SQLite + MySQL unit tests.
  postgres-integration:
    name: postgres-integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: tsqlx
          POSTGRES_PASSWORD: tsqlx
          POSTGRES_DB: tsqlx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tsqlx -d tsqlx"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Postgres integration tests
        env:
          TSQLX_TEST_POSTGRES_URL: postgres://tsqlx:tsqlx@127.0.0.1:5432/tsqlx
        run: cargo test -p tsqlx-db --test postgres -- --ignored

  # MSSQL integration test. tiberius is pure Rust so no native deps are
  # needed on the runner; we just need the SQL Server image up. Same
  # rationale as the Postgres job: Linux-only because GitHub `services:`
  # containers don't run on the macOS runners.
  mssql-integration:
    name: mssql-integration
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Tsqlx_Pass1"
          MSSQL_PID: "Developer"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Tsqlx_Pass1' -N -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 20s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run MSSQL integration tests
        env:
          TSQLX_TEST_MSSQL_URL: "mssql://sa:Tsqlx_Pass1@127.0.0.1:1433/master?encrypt=off&trust_cert=true"
        run: cargo test -p tsqlx-db --test mssql -- --ignored
